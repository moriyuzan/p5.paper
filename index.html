<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>p5.paper Library</title>
    <!-- Import p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(0,0,0,0.6);
            font-family: sans-serif;
            pointer-events: auto; 
            background: rgba(244, 241, 234, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            min-width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-height: 90vh;
            overflow-y: auto;
        }
        #ui label {
            display: block;
            margin-top: 15px;
            font-size: 0.85em;
            font-weight: bold;
        }
        #ui input[type="range"] {
            width: 100%;
            margin-top: 5px;
            cursor: pointer;
        }
        .upload-btn {
            display: block;
            margin-top: 10px;
            padding: 8px;
            background: #e0dcd3;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
        .upload-btn:hover { background: #d0ccc3; }
    </style>
</head>
<body>
    <div id="ui">
        <b style="font-size: 1.1em; color: #333;">p5.paper Controls</b><br>
        
        <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 15px 0 5px 0;">
        
        <label>Custom Seamless Image Map:</label>
        <input type="file" id="imageUpload" class="upload-btn" accept="image/*">

        <label for="blendMode">Image Blend Mode:</label>
            <select id="blendMode">
                <option value="0">Multiply (Darkens)</option>
                <option value="1">Lighten (Brightens)</option>
                <option value="2">Heightmap (Original Grooves)</option>
                <option value="3">Overlay (Contrast)</option>
                <option value="4">Screen (Brightens heavily)</option>
                <option value="5">Darken (Keeps darkest)</option>
                <option value="6">Difference (Inverts)</option>
            </select>

        <label for="imgTexSlider">Image Texture Intensity: <span id="imgTexVal">0.50</span></label>
        <input type="range" id="imgTexSlider" min="0" max="1.0" step="0.01" value="0.50">

        <label for="imgScaleSlider">Image Tiling Scale: <span id="imgScaleVal">3.0</span></label>
        <input type="range" id="imgScaleSlider" min="0.5" max="10.0" step="0.1" value="3.0">

        <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 15px 0 5px 0;">

        <label for="texSlider">Procedural Grooves (Math): <span id="texVal">0.15</span></label>
        <input type="range" id="texSlider" min="0" max="0.5" step="0.01" value="0.15">

        <label for="gritSlider">Grittiness / Blemishes: <span id="gritVal">0.30</span></label>
        <input type="range" id="gritSlider" min="0" max="1.0" step="0.01" value="0.30">

        <label for="grainSlider">Micro Grain: <span id="grainVal">0.12</span></label>
        <input type="range" id="grainSlider" min="0" max="0.5" step="0.01" value="0.12">
        
        <label for="vigSlider">Vignette: <span id="vigVal">0.60</span></label>
        <input type="range" id="vigSlider" min="0" max="1.5" step="0.01" value="0.60">

        <label for="bleedSlider">Color Bleed: <span id="bleedVal">0.003</span></label>
        <input type="range" id="bleedSlider" min="0" max="0.02" step="0.001" value="0.003">
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
